<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz de Localização</title>

  <!-- Preconnect: avisa o navegador com antecedência que vamos buscar
       algo em fonts.googleapis.com/fonts.gstatic.com, para ele já abrir
       a conexão de rede em paralelo, em vez de esperar descobrir isso
       lendo a linha de baixo. Ganho real, embora pequeno, de velocidade. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- As duas famílias de fonte que vamos usar: Baloo 2 (títulos,
       arredondada e expressiva) e Nunito (corpo do texto, legível) -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">

  <!-- Ligando o arquivo de estilo separado -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <!-- Número da pergunta atual, ex: "Pergunta 1 de 4" -->
    <p id="contador">Pergunta 1 de 4</p>

    <!-- O texto da pergunta/pista muda dinamicamente via JavaScript -->
    <h1 id="pergunta">Carregando pergunta...</h1>

    <!-- Campo de resposta de texto: só aparece nas "charadas".
         A classe "escondido" começa aplicada aqui no HTML como
         estado inicial seguro; o JavaScript é quem decide, a
         cada etapa, se remove ou mantém essa classe. -->
    <input
      type="text"
      id="resposta-input"
      class="escondido"
      placeholder="Digite sua resposta..."
      autocomplete="off"
    >

    <!-- Botão principal: texto e função mudam conforme a etapa -->
    <button id="botao-checar">É aqui!</button>

    <!-- Onde vai aparecer "Ops, lugar errado..." ou uma mensagem de sucesso -->
    <p id="mensagem"></p>

  </main>

  <!-- O script fica no fim do body -->
  <script src="script.js"></script>
</body>
</html>
